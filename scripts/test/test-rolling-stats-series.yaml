# Expected Behavior:
#
# 1. On first load:
#    - History loading will populate buffer with 24h of data
#    - rolling_statistics will immediately calculate current_range
#    - rolling_statistics_series will be empty [] until first interval passes
#
# 2. After 1 hour:
#    - range_history will have 1 entry: [[timestamp, [min, max]]]
#    - ApexCharts will show single point
#
# 3. After 24 hours:
#    - range_history will have 24 entries (one per hour)
#    - ApexCharts will show full 24h trend
#
# 4. After 48 hours:
#    - range_history will have 48 entries (max_points limit)
#    - ApexCharts will show rolling 48h window
#
# 5. Steady state:
#    - New calculations replace oldest (circular buffer behavior)
#    - Chart always shows most recent 48 hours

# Comparison: Point-in-Time vs Time-Series
#
# current_range (rolling_statistics):
#   - Updates on every data point
#   - Single value always current
#   - Good for: Real-time displays, current status
#   - Format: [18.5, 23.7]
#
# range_history (rolling_statistics_series):
#   - Updates at specified interval (1h)
#   - Array of historical calculations
#   - Good for: Trend charts, historical analysis
#   - Format: [[ts1, [18.5, 23.7]], [ts2, [19.2, 24.1]], ...]
