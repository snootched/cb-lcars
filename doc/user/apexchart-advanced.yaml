# Advanced ApexCharts Configuration Examples
# Demonstrates all 15 chart types and advanced features

type: custom:cb-lcars-msd
msd:
  data_sources:
    temperature:
      entity: sensor.outdoor_temperature
      windowSeconds: 86400

    power:
      entity: sensor.power_meter
      windowSeconds: 3600

    humidity:
      entity: sensor.humidity
      windowSeconds: 3600

    shield_strength:
      entity: sensor.shield_percentage
      windowSeconds: 300

    maintenance_schedule:
      entity: calendar.maintenance
      windowSeconds: 604800  # 1 week

    sensor_array:
      entity: sensor.directional_array
      windowSeconds: 300

    resource_allocation:
      entity: sensor.system_resources
      windowSeconds: 60

    temp_forecast:
      entity: weather.forecast
      windowSeconds: 172800  # 2 days

    correlation_data:
      entity: sensor.multi_dimensional
      windowSeconds: 3600

    energy_prices:
      entity: sensor.energy_ohlc
      windowSeconds: 86400

    sensor_stats:
      entity: sensor.statistical_data
      windowSeconds: 3600

  overlays:
    # ========================================
    # BASIC CHART TYPES (Existing 7)
    # ========================================

    # Example 1: Line Chart
    - id: line_chart
      type: apexchart
      source: temperature
      position: [50, 50]
      size: [300, 150]
      style:
        chart_type: "line"
        color: "var(--lcars-blue)"
        stroke_width: 2
        time_window: "24h"

    # Example 2: Area Chart
    - id: area_chart
      type: apexchart
      source: power
      position: [370, 50]
      size: [300, 150]
      style:
        chart_type: "area"
        color: "var(--lcars-yellow)"
        fill_opacity: 0.3
        time_window: "1h"

    # Example 3: Bar Chart
    - id: bar_chart
      type: apexchart
      source: humidity
      position: [50, 220]
      size: [300, 150]
      style:
        chart_type: "bar"
        color: "var(--lcars-green)"
        show_labels: true

    # Example 4: Pie Chart
    - id: pie_chart
      type: apexchart
      source: resource_allocation
      position: [370, 220]
      size: [200, 200]
      style:
        chart_type: "pie"
        colors:
          - "var(--lcars-blue)"
          - "var(--lcars-orange)"
          - "var(--lcars-green)"

    # Example 5: Donut Chart
    - id: donut_chart
      type: apexchart
      source: resource_allocation
      position: [590, 220]
      size: [200, 200]
      style:
        chart_type: "donut"
        show_legend: true
        legend_position: "bottom"

    # Example 6: Radar Chart
    - id: radar_chart
      type: apexchart
      source: sensor_array
      position: [50, 440]
      size: [250, 250]
      style:
        chart_type: "radar"
        colors:
          - "var(--lcars-orange)"
          - "var(--lcars-blue)"

    # Example 7: Heatmap Chart
    - id: heatmap_chart
      type: apexchart
      source: temperature
      position: [320, 440]
      size: [350, 200]
      style:
        chart_type: "heatmap"
        show_labels: false

    # ========================================
    # NEW CHART TYPES (Phase 1 - 8 types)
    # ========================================

    # Example 8: RadialBar (Gauge) Chart
    - id: radialbar_gauge
      type: apexchart
      source: shield_strength
      position: [50, 710]
      size: [200, 200]
      style:
        chart_type: "radialBar"
        color: "var(--lcars-blue)"
        value_format: "percent"
        gauge_start_angle: -90
        gauge_end_angle: 90
        show_labels: true
        chart_options:
          plotOptions:
            radialBar:
              dataLabels:
                name:
                  show: true
                  fontSize: "14px"
                  offsetY: -10
                value:
                  show: true
                  fontSize: "24px"
                  offsetY: 5

    # Example 9: RangeBar (Timeline) Chart
    - id: rangebar_timeline
      type: apexchart
      source: maintenance_schedule
      position: [270, 710]
      size: [400, 200]
      style:
        chart_type: "rangeBar"
        group_rows: true
        show_labels: true
        colors:
          - "var(--lcars-blue)"
          - "var(--lcars-orange)"
          - "var(--lcars-green)"
        chart_options:
          plotOptions:
            bar:
              horizontal: true
              barHeight: "80%"

    # Example 10: PolarArea Chart
    - id: polararea_sensors
      type: apexchart
      source: sensor_array
      position: [50, 930]
      size: [250, 250]
      style:
        chart_type: "polarArea"
        colors:
          - "var(--lcars-blue)"
          - "var(--lcars-green)"
          - "var(--lcars-orange)"
          - "var(--lcars-red)"
        legend_position: "bottom"
        chart_options:
          stroke:
            width: 2
          fill:
            opacity: 0.8

    # Example 11: Treemap Chart
    - id: treemap_resources
      type: apexchart
      source: resource_allocation
      position: [320, 930]
      size: [400, 250]
      style:
        chart_type: "treemap"
        show_labels: true
        colors:
          - "var(--lcars-blue)"
          - "var(--lcars-green)"
          - "var(--lcars-orange)"
          - "var(--lcars-red)"
        chart_options:
          plotOptions:
            treemap:
              distributed: true
              enableShades: true

    # Example 12: RangeArea Chart
    - id: rangearea_forecast
      type: apexchart
      source: temp_forecast
      position: [50, 1200]
      size: [400, 200]
      style:
        chart_type: "rangeArea"
        color: "var(--lcars-blue)"
        fill_opacity: 0.2
        show_legend: true
        legend_position: "top"
        time_window: "48h"

    # Example 13: Scatter Plot
    - id: scatter_correlation
      type: apexchart
      source: correlation_data
      position: [470, 1200]
      size: [400, 200]
      style:
        chart_type: "scatter"
        marker_size: 6
        show_grid: true
        colors:
          - "var(--lcars-blue)"
          - "var(--lcars-orange)"
        legend_position: "top"

    # Example 14: Candlestick Chart
    - id: candlestick_energy
      type: apexchart
      source: energy_prices
      position: [50, 1420]
      size: [400, 250]
      style:
        chart_type: "candlestick"
        time_window: "24h"
        chart_options:
          plotOptions:
            candlestick:
              colors:
                upward: "var(--lcars-green)"
                downward: "var(--lcars-red)"

    # Example 15: BoxPlot Chart
    - id: boxplot_distribution
      type: apexchart
      source: sensor_stats
      position: [470, 1420]
      size: [400, 250]
      style:
        chart_type: "boxPlot"
        color: "var(--lcars-blue)"
        chart_options:
          stroke:
            width: 2
            colors: ["var(--lcars-white)"]

    # ========================================
    # ADVANCED FEATURES EXAMPLES
    # ========================================

    # Example 16: Multi-Axis Chart (using chart_options)
    - id: multi_axis_chart
      type: apexchart
      source: [temperature, humidity]
      position: [50, 1690]
      size: [400, 200]
      style:
        chart_type: "line"
        colors:
          - "var(--lcars-blue)"
          - "var(--lcars-green)"
        show_legend: true
        chart_options:
          yaxis:
            - title:
                text: "Temperature (°C)"
              labels:
                style:
                  colors: "var(--lcars-blue)"
            - opposite: true
              title:
                text: "Humidity (%)"
              labels:
                style:
                  colors: "var(--lcars-green)"

    # Example 17: Advanced Annotations
    - id: annotated_chart
      type: apexchart
      source: temperature
      position: [470, 1690]
      size: [400, 200]
      style:
        chart_type: "line"
        color: "var(--lcars-blue)"
        time_window: "24h"
        chart_options:
          annotations:
            yaxis:
              - y: 25
                borderColor: "var(--lcars-orange)"
                strokeDashArray: 4
                label:
                  text: "Warning Threshold"
                  style:
                    background: "var(--lcars-orange)"
              - y: 30
                borderColor: "var(--lcars-red)"
                label:
                  text: "Critical Threshold"
                  style:
                    background: "var(--lcars-red)"

    # Example 18: Custom Gradient (using chart_options)
    - id: gradient_chart
      type: apexchart
      source: power
      position: [50, 1910]
      size: [400, 200]
      style:
        chart_type: "area"
        time_window: "1h"
        chart_options:
          fill:
            type: "gradient"
            gradient:
              shade: "dark"
              type: "vertical"
              gradientToColors: ["var(--lcars-blue)", "var(--lcars-purple)"]
              stops: [0, 100]
              opacityFrom: 0.9
              opacityTo: 0.1

    # Example 19: RadialBar with Multiple Series
    - id: multi_gauge
      type: apexchart
      source: [shield_strength, power, humidity]
      position: [470, 1910]
      size: [250, 250]
      style:
        chart_type: "radialBar"
        colors:
          - "var(--lcars-blue)"
          - "var(--lcars-yellow)"
          - "var(--lcars-green)"
        value_format: "percent"
        show_legend: true
        legend_position: "bottom"

    # Example 20: Sparkline (minimal chart)
    - id: sparkline_chart
      type: apexchart
      source: temperature
      position: [740, 1910]
      size: [200, 50]
      style:
        chart_type: "line"
        color: "var(--lcars-orange)"
        stroke_width: 2
        time_window: "1h"
        chart_options:
          chart:
            sparkline:
              enabled: true
          tooltip:
            fixed:
              enabled: false

    # ========================================
    # ANIMATION PRESET EXAMPLES (Phase 3)
    # ========================================

    # Example 21: Dramatic Entrance
    - id: dramatic_warp_core
      type: apexchart
      template: "power_monitor"
      animation_preset: "lcars_dramatic"  # 1200ms cinematic
      source: warp_core_power
      position: [50, 2130]
      size: [400, 200]

    # Example 22: Realtime Network Feed
    - id: realtime_network
      type: apexchart
      template: "sensor_monitor"
      animation_preset: "lcars_realtime"  # No entrance, fast updates
      source: network_traffic
      position: [470, 2130]
      size: [300, 150]

    # Example 23: Alert Gauge
    - id: alert_shield
      type: apexchart
      template: "gauge_radial"
      animation_preset: "lcars_alert"  # Attention-grabbing
      source: shield_status
      position: [50, 2350]
      size: [200, 200]

    # Example 24: Minimal Secondary Display
    - id: minimal_humidity
      type: apexchart
      template: "sensor_monitor"
      animation_preset: "lcars_minimal"  # Quick, subtle
      source: humidity
      position: [270, 2350]
      size: [300, 150]

    # Example 25: Static Accessibility Chart
    - id: static_comparison
      type: apexchart
      template: "comparison_bar"
      animation_preset: "none"  # No animations
      source: resource_comparison
      position: [590, 2350]
      size: [300, 150]

    # Example 26: Custom Animation Override
    - id: custom_speed
      type: apexchart
      template: "sensor_monitor"
      animation_preset: "lcars_standard"
      source: temperature
      position: [50, 2520]
      size: [300, 150]
      style:
        chart_options:
          chart:
            animations:
              speed: 1500  # Override: 800ms → 1500ms

    # Example 27: Multi-Series with Gradual Delay
    - id: gradual_series
      type: apexchart
      template: "multi_metric"
      animation_preset: "lcars_dramatic"  # 200ms delay between series
      source: [temp, humidity, pressure]
      position: [370, 2520]
      size: [400, 200]
