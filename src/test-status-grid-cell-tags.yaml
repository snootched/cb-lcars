################################################################################
# EXPECTED BEHAVIORS
################################################################################
#
# Single Tag ({tag: "X"}):
# - Matches ANY cell that has tag "X"
# - OR logic if cell has multiple tags
#
# Multiple Tags ({tags: ["X", "Y"]}):
# - Default: OR logic - matches cells with "X" OR "Y"
# - With match_all: true - AND logic - matches cells with "X" AND "Y"
#
# Real-World Use Cases:
# 1. Department-based alerts (engineering, tactical, medical)
# 2. Critical system failures (critical + department)
# 3. Multi-tag filtering (critical + propulsion for warp failures)
# 4. Semantic grouping (environment, communications, weapons)
#
################################################################################
